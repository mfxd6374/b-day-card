<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!❤</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #ffb6c1, #ffe4e1);
      font-family: 'Comic Sans MS', cursive, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    .card {
      text-align: center;
      padding: 50px;
      animation: floatIn 2s ease-in-out;
      position: relative;
      top: 20%;
    }

    h1 {
      font-size: 3em;
      color: #fff;
      text-shadow: 2px 2px #ff69b4;
    }

    .message {
      font-size: 1.5em;
      color: #fff;
    }

    .cake {
      font-size: 5em;
      margin-top: 20px;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    @keyframes floatIn {
      from {
        transform: translateY(-100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .balloon-container {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .balloon {
      position: absolute;
      bottom: -100px;
      width: 40px;
      height: 60px;
      background: radial-gradient(circle at 30% 30%, #ff69b4, #ff1493);
      border-radius: 50%;
      z-index: 0;
      opacity: 0.9;
    }

    .balloon::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      width: 2px;
      height: 40px;
      background-color: #555;
      transform: translateX(-50%);
      opacity: 0.7;
      animation: swayString 6s infinite ease-in;
    }

    @keyframes swayString {
      0% { transform: translateX(-50%) rotate(0deg); }
      50% { transform: translateX(-50%) rotate(5deg); }
      100% { transform: translateX(-50%) rotate(-5deg); }
    }

    @keyframes floatBalloon {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0.8;
      }
      50% {
        transform: translateY(-50vh) translateX(-20px);
      }
      100% {
        transform: translateY(-100vh) translateX(20px);
        opacity: 0;
      }
    }

    /* Button Styling */
    #confetti-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background-color: #ff69b4;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 1.2em;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.2s ease;
      z-index: 10;
    }

    #confetti-btn:hover {
      transform: translateX(-50%) scale(1.05);
      background-color: #ff1493;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🎉 Happy Birthday, <span id="name">Deepi</span>! 🎉</h1>
    <p class="message">Wishing you joy, love and cake 😋🍰❤</p>
    <div class="cake">🎂</div>
  </div>

  <div class="balloon-container" id="balloon-container"></div>


  

  <button id="confetti-btn">🎉 Celebrate!</button>


  <!-- Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <!-- Confetti on Page Load -->
  <script>
    confetti({
      particleCount: 200,
      spread: 120,
      origin: { y: 0.6 }
    });
  </script>
  
  <!-- Confetti on Button Click -->
  <script>
    window.onload = function() {
  const button = document.getElementById("confetti-btn");
  const bgMusic = document.getElementById("bg-music");

  button.addEventListener("click", () => {
    bgMusic.volume = 1.0;

    if (bgMusic.paused) {
      bgMusic.play();
    }

    confetti({
      particleCount: 150,
      spread: 90,
      origin: { y: 0.6 }
    });
  });
}

  

</script>
<audio id="bg-music" src="happy_birthday.mp3" autoplay loop></audio>


  <!-- Balloon Generator Script -->
  <script>
    const container = document.getElementById('balloon-container');

    for (let i = 0; i < 20; i++) {
      const balloon = document.createElement('div');
      balloon.classList.add('balloon');

      // Random position
      balloon.style.left = Math.random() * 100 + "%";


      // Random delay and duration
      const delay = Math.random() * 5;
      const duration = 5 + Math.random() * 5;
      balloon.style.animation = `floatBalloon ${duration}s infinite ease-in`;
      balloon.style.animationDelay = `${delay}s`;

      // Random colors
      const colors = ['#ff69b4', '#ff1493', '#f06292', '#f48fb1', '#ec407a'];
      balloon.style.background = colors[Math.floor(Math.random() * colors.length)];

      container.appendChild(balloon);
    }
  </script>
  


</body>
</html>
